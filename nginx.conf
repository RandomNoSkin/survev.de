# survev.de production nginx template.
#
# Placeholders to replace on the server:
#   <domain>          e.g.  survev.de
#   <path/to/client>  e.g.  /opt/survev.de/client/dist
#
# Topology (this box = the API/EU host):
#   - API server  (Hono/uWS)  @ 127.0.0.1:8000  -> /api, /moderation, /private, /team_v2, /private_lobby_v2
#   - Game servers (uWS)       @ :8001 (eu), :8002 (scrims), ...
#
# The game servers terminate TLS THEMSELVES (config `gameServer.ssl` -> uWS SSLApp)
# and the client connects straight to `survev.de:<port>` over wss. nginx therefore
# does NOT proxy /play here — it only serves the static client + the API server.
# Because the game sockets are direct (not proxied), the game server sees the real
# client IP on the socket, so do NOT set gameServer.proxyIPHeader (that would only be
# needed behind a proxy and would enable IP spoofing on a directly-exposed port).

# Shared proxy headers (IP forwarding + WebSocket upgrade for team_v2/private_lobby_v2).
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ── HTTP :80 — ACME challenge + redirect everything to HTTPS ──────────────────
server {
    listen 80;
    listen [::]:80;
    server_name <domain>;

    # Let's Encrypt / certbot HTTP-01 renewal must stay reachable over plain HTTP.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS :443 ────────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name <domain>;

    ssl_certificate     /etc/letsencrypt/live/<domain>/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/<domain>/privkey.pem;
    # Recommended TLS settings dropped in by certbot's nginx installer:
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Static client build
    root <path/to/client>;
    index index.html;

    # Entry point + any .html: never hard-cache, so returning players pick up new
    # deploys (there is no service worker; cache headers are the only update lever).
    location / {
        add_header Cache-Control "no-cache, must-revalidate" always;
        try_files $uri $uri/ /index.html;
    }

    # Content-hashed assets: cache hard + immutable.
    location ~* \.(?:js|css|png|jpe?g|gif|svg|webp|ico|woff2?|ttf|eot|mp3|ogg|wav|json|txt|xml)$ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    # ── API server (Hono @ 127.0.0.1:8000) ──
    location ~ ^/(api|moderation|private|team_v2|private_lobby_v2)(/|$) {
        proxy_http_version 1.1;

        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $http_host;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_pass http://127.0.0.1:8000;
        proxy_redirect off;
    }

    # NOTE: no /play block — game servers serve wss:// directly on their own ports
    # (see gameServer.ssl in survev-config.hjson).
}
