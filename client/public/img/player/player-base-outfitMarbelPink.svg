<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
  xmlns:dc="http://purl.org/dc/elements/1.1/"
  xmlns:cc="http://creativecommons.org/ns#"
  xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#"
  xmlns:svg="http://www.w3.org/2000/svg"
  xmlns="http://www.w3.org/2000/svg"
  xmlns:sodipodi="http://sodipodi.sourceforge.net/DTD/sodipodi-0.0.2"
  xmlns:inkscape="http://www.inkscape.org/namespaces/inkscape"
  width="140"
  height="140"
  version="1.1"
  id="svg4"
  sodipodi:docname="player-skin-marble-pink.svg"
  inkscape:version="0.92.2 (5c3e80d, 2017-08-06)">

  <metadata id="metadata10">
    <rdf:RDF>
      <cc:Work rdf:about="">
        <dc:format>image/svg+xml</dc:format>
        <dc:type rdf:resource="http://purl.org/dc/dcmitype/StillImage" />
        <dc:title>Marble Pink Skin</dc:title>
      </cc:Work>
    </rdf:RDF>
  </metadata>

  <defs id="defs8">
    <!-- Clip path to constrain everything inside the circle -->
    <clipPath id="circleClip">
      <ellipse cx="70" cy="70" rx="66.5" ry="66.5" />
    </clipPath>

    <!-- Turbulence filter for liquid marble swirl effect -->
    <filter id="marbleFilter" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence
        type="turbulence"
        baseFrequency="0.012 0.008"
        numOctaves="6"
        seed="5"
        result="turbulence" />
      <feDisplacementMap
        in="SourceGraphic"
        in2="turbulence"
        scale="55"
        xChannelSelector="R"
        yChannelSelector="G"
        result="displaced" />
    </filter>

    <!-- Swirl distortion filter for the pink veins -->
    <filter id="swirl" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence
        type="fractalNoise"
        baseFrequency="0.018 0.012"
        numOctaves="5"
        seed="12"
        result="noise" />
      <feDisplacementMap
        in="SourceGraphic"
        in2="noise"
        scale="38"
        xChannelSelector="R"
        yChannelSelector="B"
        result="swirled" />
    </filter>

    <!-- Gradient: deep dark base like the image background -->
    <radialGradient id="darkBase" cx="50%" cy="50%" r="60%" fx="35%" fy="40%">
      <stop offset="0%" stop-color="#1a0a1e" />
      <stop offset="40%" stop-color="#0d0510" />
      <stop offset="100%" stop-color="#000000" />
    </radialGradient>

    <!-- Main magenta/pink fluid gradient -->
    <linearGradient id="pinkFluid1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d4006e" stop-opacity="0.95" />
      <stop offset="25%" stop-color="#e8008a" stop-opacity="0.9" />
      <stop offset="50%" stop-color="#c200a0" stop-opacity="1" />
      <stop offset="75%" stop-color="#9b0085" stop-opacity="0.88" />
      <stop offset="100%" stop-color="#6a0050" stop-opacity="0.9" />
    </linearGradient>

    <!-- Hot pink vein gradient -->
    <linearGradient id="pinkVein1" x1="10%" y1="0%" x2="90%" y2="100%">
      <stop offset="0%" stop-color="#ff00a8" stop-opacity="0.8" />
      <stop offset="40%" stop-color="#ff2db5" stop-opacity="0.95" />
      <stop offset="100%" stop-color="#cc0077" stop-opacity="0.7" />
    </linearGradient>

    <!-- Light pink highlight -->
    <linearGradient id="pinkHighlight" x1="0%" y1="0%" x2="60%" y2="100%">
      <stop offset="0%" stop-color="#ff80d0" stop-opacity="0.7" />
      <stop offset="50%" stop-color="#ff40bb" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#dd1090" stop-opacity="0.4" />
    </linearGradient>

    <!-- Green accent (like the small green streaks in the image) -->
    <linearGradient id="greenAccent" x1="0%" y1="0%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#00ff80" stop-opacity="0.75" />
      <stop offset="50%" stop-color="#40ffaa" stop-opacity="0.85" />
      <stop offset="100%" stop-color="#00cc60" stop-opacity="0.6" />
    </linearGradient>

    <!-- Purple/dark magenta swirl -->
    <linearGradient id="purpleSwirl" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5a0040" stop-opacity="0.9" />
      <stop offset="50%" stop-color="#3d0030" stop-opacity="0.95" />
      <stop offset="100%" stop-color="#1a0015" stop-opacity="0.8" />
    </linearGradient>

    <!-- Sheen / gloss overlay -->
    <radialGradient id="gloss" cx="38%" cy="32%" r="45%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.22" />
      <stop offset="50%" stop-color="#ff88dd" stop-opacity="0.08" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0.0" />
    </radialGradient>

    <!-- Edge vignette -->
    <radialGradient id="vignette" cx="50%" cy="50%" r="50%">
      <stop offset="65%" stop-color="#000000" stop-opacity="0.0" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0.55" />
    </radialGradient>
  </defs>

  <sodipodi:namedview
    pagecolor="#ffffff"
    bordercolor="#666666"
    borderopacity="1"
    objecttolerance="10"
    gridtolerance="10"
    guidetolerance="10"
    inkscape:pageopacity="0"
    inkscape:pageshadow="2"
    id="namedview6"
    showgrid="false" />

  <!-- === MAIN CIRCLE === -->

  <!-- 1. Dark base layer -->
  <ellipse cx="70" cy="70" rx="66.5" ry="66.5"
    style="fill:url(#darkBase); stroke:none;" />

  <!-- Clipped group: all marble layers stay inside circle -->
  <g clip-path="url(#circleClip)">

    <!-- 2. Large primary magenta fluid body — main big pink mass top-center -->
    <ellipse cx="75" cy="45" rx="80" ry="75"
      style="fill:url(#pinkFluid1); opacity:0.92;"
      filter="url(#marbleFilter)" />

    <!-- 3. Dark purple deep swirl (bottom-left shadow area) -->
    <path d="M -10,80 Q 20,30 50,60 Q 80,90 60,140 Q 30,155 -10,120 Z"
      style="fill:url(#purpleSwirl); opacity:0.88;"
      filter="url(#swirl)" />

    <!-- 4. Second dark mass top-right -->
    <ellipse cx="100" cy="25" rx="55" ry="50"
      style="fill:#0d0510; opacity:0.75;"
      filter="url(#swirl)" />

    <!-- 5. Hot pink bright vein — sweeping diagonal from top-left to bottom-right -->
    <path d="M -5,10 Q 40,50 65,70 Q 90,90 145,130"
      style="fill:none; stroke:url(#pinkVein1); stroke-width:22; stroke-linecap:round; opacity:0.82;"
      filter="url(#swirl)" />

    <!-- 6. Secondary hot pink vein — flowing left -->
    <path d="M 10,40 Q 45,65 55,85 Q 65,105 40,145"
      style="fill:none; stroke:#e0009a; stroke-width:15; stroke-linecap:round; opacity:0.75;"
      filter="url(#marbleFilter)" />

    <!-- 7. Thin bright pink highlight ribbon across top -->
    <path d="M 20,0 Q 55,20 70,40 Q 85,60 145,55"
      style="fill:none; stroke:#ff60cc; stroke-width:9; stroke-linecap:round; opacity:0.65;"
      filter="url(#swirl)" />

    <!-- 8. Light pink soft mass (big bright area center-top like in image) -->
    <ellipse cx="60" cy="55" rx="50" ry="42"
      style="fill:url(#pinkHighlight); opacity:0.58;"
      filter="url(#marbleFilter)" />



    <!-- 11. Dark fluid shadow mass bottom-left (like dark areas in original) -->
    <ellipse cx="20" cy="115" rx="55" ry="40"
      style="fill:#0a0008; opacity:0.72;"
      filter="url(#swirl)" />

    <!-- 12. Dark mass right side -->
    <ellipse cx="125" cy="90" rx="40" ry="55"
      style="fill:#0d0010; opacity:0.65;"
      filter="url(#marbleFilter)" />

    <!-- 13. Small hot-pink tight swirl near center-right (adds depth) -->
    <ellipse cx="95" cy="80" rx="28" ry="22"
      style="fill:#cc0080; opacity:0.55;"
      filter="url(#swirl)" />

    <!-- 14. Gloss/sheen overlay for liquid feel -->
    <ellipse cx="70" cy="70" rx="66.5" ry="66.5"
      style="fill:url(#gloss); opacity:1;" />

    <!-- 15. Edge vignette to give circular depth -->
    <ellipse cx="70" cy="70" rx="66.5" ry="66.5"
      style="fill:url(#vignette); opacity:1;" />

  </g>

  <!-- Circle border — subtle dark magenta rim -->
  <ellipse cx="70" cy="70" rx="66.5" ry="66.5"
    style="fill:none; stroke:#550040; stroke-width:2.2; opacity:0.9;" />

</svg>
